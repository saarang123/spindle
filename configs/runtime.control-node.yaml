# Runtime supervisor config for the control node.
#
# Hosts CPU-bound workers: HTTP API clients (OpenAI / Anthropic / etc.),
# audio stitching, ffmpeg. Heavy GPU work belongs on the gpu-node.
#
# Run with:
#   spindle workers run --config configs/runtime.control-node.yaml
#
# See ../runtime/PLAN.md for the schema reference.
node_id: control-node
log_dir: ~/.spindle/logs
shutdown_grace_seconds: 10

# Embedded dispatcher. Reads jobs from Redis (configs derived from local
# workers' SPINDLE_WORKER_CONFIG_ID), leases via Mongo CAS, IPC-dispatches
# to local workers. Comment out this block to run supervisor-only mode.
dispatcher:
  lease_ttl_seconds: 300
  tick_block_ms: 200
  # configs: []        # leave empty to auto-derive from workers below

workers:
  - name: audio-tts-openai
    module: spindle_workers.audio_tts.openai
    replicas: 4
    env:
      SPINDLE_WORKER_CONFIG_ID: audio-tts-openai-v1
    restart:
      policy: always
      backoff_s: [1, 2, 4, 8, 30]

  # Kokoro-82M can also run on CPU. To test locally on the control node,
  # uncomment the entry below AND provide a Python 3.12/3.13 venv at
  # ~/envs/kokoro/bin/python (kokoro's transitive spacy dep doesn't ship
  # 3.14 wheels):
  #   uv venv --python 3.13 ~/envs/kokoro
  #   ~/envs/kokoro/bin/pip install spindle-core spindle-workers[audio_tts_kokoro]
  #
  # - name: audio-tts-kokoro
  #   module: spindle_workers.audio_tts.kokoro
  #   python: ~/envs/kokoro/bin/python
  #   replicas: 1
  #   env:
  #     SPINDLE_WORKER_CONFIG_ID: audio-tts-kokoro-v1

  # Future workers land here, e.g.:
  #
  # - name: text-rewrite-claude
  #   module: spindle_workers.text_llm
  #   replicas: 3
  #   env:
  #     SPINDLE_WORKER_CONFIG_ID: text-rewrite-claude-v1
  #     SPINDLE_LLM_BACKEND: claude
