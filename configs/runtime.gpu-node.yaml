# Runtime supervisor config for the GPU node (DGX Spark).
#
# Hosts GPU-bound workers: local TTS models, future image / video diffusion.
# CPU-bound work (HTTP API clients) belongs on the control-node.
#
# Run with:
#   spindle workers run --config configs/runtime.gpu-node.yaml
#
# See ../runtime/PLAN.md for the schema reference.
node_id: gpu-node
log_dir: ~/.spindle/logs
shutdown_grace_seconds: 10

workers:
  # GPU workers can pin their own Python interpreter via `python:` — useful
  # when models have incompatible torch / CUDA versions and need isolated envs.
  # If `python:` is omitted the supervisor uses sys.executable (shared venv).

  - name: audio-tts-f5
    module: spindle_workers.audio_tts.f5      # f5 subpackage not built yet in v0
    # python: ~/envs/f5-tts/bin/python        # dedicated venv (uncomment to use)
    replicas: 1
    env:
      SPINDLE_WORKER_CONFIG_ID: audio-tts-f5-v1
    restart:
      policy: always
      backoff_s: [1, 2, 4, 8, 30]

  - name: audio-tts-kokoro
    module: spindle_workers.audio_tts.kokoro
    # python: ~/envs/kokoro/bin/python        # dedicated venv (uncomment to use)
    replicas: 1
    env:
      SPINDLE_WORKER_CONFIG_ID: audio-tts-kokoro-v1
    restart:
      policy: always
      backoff_s: [1, 2, 4, 8, 30]

  # Future workers land here, e.g.:
  #
  # - name: image-comfy
  #   module: spindle_workers.image_comfy
  #   replicas: 1
  #   env:
  #     SPINDLE_WORKER_CONFIG_ID: image-sdxl-v1
