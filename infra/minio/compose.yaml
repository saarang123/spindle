# MinIO — S3-compatible object store. Backs Spindle's ArtifactStore via the
# `s3` backend. Same compose file works on Mac (Docker Desktop) and Linux
# (Docker Engine).
#
# Deployment targets:
#   - DEV:  control node, MINIO_DATA_DIR=~/spindle/minio-data
#   - PROD: GPU node,     MINIO_DATA_DIR=/path/to/large/ssd (whatever disk
#                                                            backs the bytes)
#
# Use `bootstrap.sh` to first-time-init creds + data dir, then `docker compose
# up -d` to start. Re-running bootstrap.sh is safe (idempotent).

services:
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: spindle-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"          # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"      # web admin UI
    volumes:
      - "${MINIO_DATA_DIR:?MINIO_DATA_DIR is required — see bootstrap.sh}:/data"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      # MINIO_BROWSER_REDIRECT_URL avoids broken links if console runs behind
      # a proxy or on a non-default host. Set it via env if needed.
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
